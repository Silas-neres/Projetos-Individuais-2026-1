services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: uda_pipeline
      POSTGRES_USER: uda_user
      POSTGRES_PASSWORD: uda_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uda_user -d uda_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
